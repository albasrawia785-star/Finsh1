name: Build Web App to Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Initialize Android Wrapper (Capacitor)
      run: |
        # إنشاء ملف package.json إذا لم يكن موجوداً لتشغيل الأدوات
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # تثبيت أدوات تحويل الموقع إلى تطبيق
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        
        # إعداد المشروع (اسم التطبيق واسم الحزمة)
        # يمكنك تغيير "My Offline App" لاسم تطبيقك
        npx cap init "My Offline App" "com.offlineapp.pos" --web-dir=. --confirm
        
        # إضافة منصة الأندرويد للموقع
        npx cap add android

    - name: Inject WebView Storage & Download Permissions
      run: |
        MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
        if [ ! -z "$MANIFEST_FILE" ]; then
          echo "Injecting storage permissions into Manifest..."
          # إضافة صلاحيات تخزين الملفات وحفظ الـ PDF والنسخ الاحتياطي للهاتف
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
          sed -i '/<application/a \        android:requestLegacyExternalStorage="true"' "$MANIFEST_FILE"
        fi

    - name: Sync Web Files to Android
      run: |
        npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: offline-app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
