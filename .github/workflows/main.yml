name: Build Web App to Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Extract Project Files
      run: |
        # فك ضغط ملف المشروع مباشرة في المجلد الرئيسي للسيرفر
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        if [ ! -z "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE, extracting to root..."
          unzip -o "$ZIP_FILE" -d .
          # حذف ملف الـ zip بعد الفك لتنظيف المجلد
          rm "$ZIP_FILE"
        else
          echo "No zip file found!"
        fi

        # التحقق مما إذا تم فك الملفات داخل مجلد فرعي ونقلها للمجلد الرئيسي
        INDEX_PATH=$(find . -name "index.html" | head -n 1)
        if [ ! -z "$INDEX_PATH" ]; then
          SRC_DIR=$(dirname "$INDEX_PATH")
          if [ "$SRC_DIR" != "." ]; then
            echo "Moving files from subfolder $SRC_DIR to root..."
            cp -r "$SRC_DIR"/* .
          fi
        fi

    - name: Initialize Android Wrapper (Direct Build)
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        
        # إنشاء ملف الإعدادات برمجياً لتخطي رفض النقطة (.) واستهداف المجلد الرئيسي مباشرة
        echo '{
          "appId": "com.offlineapp.pos",
          "appName": "Saydali Pro POS",
          "webDir": ".",
          "bundledWebRuntime": false
        }' > capacitor.config.json

        npx cap add android

    - name: Inject WebView Storage & Download Permissions
      run: |
        MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
        if [ ! -z "$MANIFEST_FILE" ]; then
          echo "Injecting storage permissions into Manifest..."
          # تفعيل صلاحيات التخزين الكاملة لحفظ الـ PDF والنسخ الاحتياطي
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
          sed -i '/<application/a \        android:requestLegacyExternalStorage="true"' "$MANIFEST_FILE"
        fi

    - name: Sync Web Files to Android
      run: |
        npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: saydali-pro-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
