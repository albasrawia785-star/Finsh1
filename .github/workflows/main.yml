name: Build Web App to Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Prepare Web Directory
      run: |
        # إنشاء مجلد www ونقل ملفات الموقع الحالية إليه ليقبلها Capacitor
        mkdir -p www
        find . -maxdepth 1 -type f ! -name "package*" ! -name ".*" -exec cp {} www/ \;
        # نسخ المجلدات الفرعية للموقع إن وجدت (مثل مجلدات الصور أو التنسيقات) إلى داخل www
        find . -maxdepth 1 -type d ! -name "." ! -name ".." ! -name ".git" ! -name ".github" ! -name "www" ! -name "node_modules" -exec cp -r {} www/ \; 2>/dev/null || true

    - name: Initialize Android Wrapper (Capacitor)
      run: |
        # إنشاء ملف package.json إذا لم يكن موجوداً
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # تثبيت أدوات تحويل الموقع إلى تطبيق
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        
        # إعداد المشروع وتحديد مجلد الـ web-dir إلى www
        npx cap init "My Offline App" "com.offlineapp.pos" --web-dir=www
        
        # إضافة منصة الأندرويد
        npx cap add android

    - name: Inject WebView Storage & Download Permissions
      run: |
        MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
        if [ ! -z "$MANIFEST_FILE" ]; then
          echo "Injecting storage permissions into Manifest..."
          # إضافة صلاحيات التخزين وتحميل واستيراد الملفات من الهاتف
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
          sed -i '/<application/a \        android:requestLegacyExternalStorage="true"' "$MANIFEST_FILE"
        fi

    - name: Sync Web Files to Android
      run: |
        npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: offline-app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
