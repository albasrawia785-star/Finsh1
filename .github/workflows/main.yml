name: Android CI/CD - Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Inject Storage Permissions for PDF Export
      run: |
        # البحث عن ملف المانيفست الخاص بالأندرويد لإضافة صلاحيات حفظ الـ PDF
        MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
        if [ -not -z "$MANIFEST_FILE" ]; then
          echo "Found AndroidManifest.xml, injecting storage permissions..."
          # إضافة صلاحيات الإنترنت والتخزين والكتابة الضرورية لتصدير الملفات
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
          
          # تفعيل خاصية التعامل مع الملفات القديمة والجديدة في الأندرويد
          sed -i '/<application/a \        android:requestLegacyExternalStorage="true"' "$MANIFEST_FILE"
        fi

    - name: Build Debug APK
      run: |
        SETTINGS_FILE=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1)
        
        if [ -z "$SETTINGS_FILE" ]; then
          echo "Error: Android project settings file not found in repository!"
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$SETTINGS_FILE")
        echo "Successfully found Android project directory at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: school-timetable-app-debug-apk
        path: |
          **/build/outputs/apk/debug/*.apk
