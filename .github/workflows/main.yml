name: Build Web App to Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Extract Project Files & Create Temporary Dist
      run: |
        # إنشاء مجلد مؤقت للبناء فقط داخل السيرفر (لن يظهر في مستودعك على موقع جيتهاب)
        mkdir -p dist
        
        # فك ضغط ملف المشروع في المجلد الرئيسي للسيرفر أولاً
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ ! -z "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE, extracting..."
          unzip -o "$ZIP_FILE" -d .
          rm "$ZIP_FILE"
        fi

        # البحث عن ملف index.html لنقل الملفات إلى مجلد dist المؤقت
        INDEX_PATH=$(find . -name "index.html" ! -path "./dist/*" | head -n 1)
        if [ ! -z "$INDEX_PATH" ]; then
          SRC_DIR=$(dirname "$INDEX_PATH")
          echo "Found index.html at $SRC_DIR, copying to temporary dist..."
          cp -r "$SRC_DIR"/* dist/
        else
          # كخيار احتياطي إذا كانت الملفات منثورة في المجلد الرئيسي
          find . -maxdepth 1 -type f ! -name "package*" ! -name ".*" -exec cp {} dist/ \;
          find . -maxdepth 1 -type d ! -name "." ! -name ".." ! -name ".git" ! -name ".github" ! -name "dist" -exec cp -r {} dist/ \; 2>/dev/null || true
        fi

    - name: Initialize Android Wrapper (Targeting Dist)
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        
        # توجيه الإعدادات للمجلد المؤقت dist ليرضى Capacitor ويتخطى الخطأ السابق حتماً
        npx cap init "Saydali Pro POS" "com.offlineapp.pos" --web-dir=dist
        npx cap add android

    - name: Inject WebView Storage & Download Permissions
      run: |
        MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
        if [ ! -z "$MANIFEST_FILE" ]; then
          echo "Injecting storage permissions into Manifest..."
          # تفعيل صلاحيات التخزين الكاملة وتنزيل ملفات الـ PDF داخل التطبيق
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
          sed -i '/<application/a \        android:requestLegacyExternalStorage="true"' "$MANIFEST_FILE"
        fi

    - name: Sync Web Files to Android
      run: |
        npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: saydali-pro-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
